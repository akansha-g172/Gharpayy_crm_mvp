<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Capture Form - Gharpayy CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Gharpayy CRM</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-blue-200">Home</a>
                <a href="/capture" class="hover:text-blue-200">Capture Lead</a>
                <a href="/leads" class="hover:text-blue-200">Leads</a>
                <a href="/dashboard" class="hover:text-blue-200">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mt-8 p-6">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-3xl font-bold mb-6 text-blue-600">Capture New Lead</h2>
            <form id="leadForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Full Name *</label>
                    <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="10-digit number" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Lead Source *</label>
                    <select id="source" name="source" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Select Source</option>
                        <option value="Google Search">Google Search</option>
                        <option value="Facebook Ads">Facebook Ads</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Referral">Referral</option>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Direct Call">Direct Call</option>
                        <option value="Website">Website</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                    Capture Lead
                </button>
            </form>
            <div id="message" class="mt-4 p-3 rounded-lg hidden"></div>
        </div>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/api/leads/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        phone: document.getElementById('phone').value,
                        source: document.getElementById('source').value
                    })
                });

                if (response.ok) {
                    const lead = await response.json();
                    messageDiv.className = 'mt-4 p-3 rounded-lg bg-green-100 text-green-800';
                    messageDiv.innerHTML = `✓ Lead captured successfully! ID: ${lead.id}, Assigned to Agent ID: ${lead.assigned_agent_id}`;
                    document.getElementById('leadForm').reset();
                } else {
                    messageDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-800';
                    messageDiv.innerHTML = '✗ Error capturing lead';
                }
            } catch (error) {
                messageDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-800';
                messageDiv.innerHTML = `✗ Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
