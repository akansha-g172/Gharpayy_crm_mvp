<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Visit - Gharpayy CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Gharpayy CRM</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-blue-200">Home</a>
                <a href="/capture" class="hover:text-blue-200">Capture Lead</a>
                <a href="/leads" class="hover:text-blue-200">Leads</a>
                <a href="/dashboard" class="hover:text-blue-200">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mt-8 p-6">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-3xl font-bold mb-6 text-blue-600">Schedule Property Visit</h2>
            <form id="visitForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Select Lead *</label>
                    <select id="leadId" name="lead_id" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Loading leads...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Property Name *</label>
                    <input type="text" id="propertyName" name="property_name" required placeholder="e.g., Green Park PG, Bangalore" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Visit Date *</label>
                        <input type="date" id="visitDate" name="visit_date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Visit Time *</label>
                        <input type="time" id="visitTime" name="visit_time" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Assigned Staff</label>
                    <input type="text" id="assignedStaff" name="assigned_staff" placeholder="Staff name (optional)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Visit Outcome (Optional)</label>
                    <select id="outcome" name="outcome" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Not yet completed</option>
                        <option value="Booked">Booked</option>
                        <option value="Considering">Considering</option>
                        <option value="Not Interested">Not Interested</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                    Schedule Visit
                </button>
            </form>
            <div id="message" class="mt-4 p-3 rounded-lg hidden"></div>
        </div>

        <div class="bg-white rounded-lg shadow-lg mt-8 p-8">
            <h3 class="text-2xl font-bold mb-4">Upcoming Visits</h3>
            <div id="visitsList" class="space-y-3">
                <!-- Visits will load here -->
            </div>
        </div>
    </div>

    <script>
        async function loadLeads() {
            try {
                const res = await fetch('/api/leads/');
                const leads = await res.json();
                const select = document.getElementById('leadId');
                select.innerHTML = '<option value="">Select a Lead</option>';
                leads.forEach(lead => {
                    const option = document.createElement('option');
                    option.value = lead.id;
                    option.textContent = `${lead.name} (${lead.phone})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading leads:', error);
            }
        }

        async function loadVisits() {
            try {
                const res = await fetch('/api/visits/');
                const visits = await res.json();
                const container = document.getElementById('visitsList');
                
                if (visits.length === 0) {
                    container.innerHTML = '<p class="text-gray-500">No visits scheduled yet.</p>';
                    return;
                }

                container.innerHTML = visits.map(visit => {
                    const visitDate = new Date(visit.visit_date).toLocaleDateString();
                    const outcomeColor = visit.outcome === 'Booked' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
                    return `
                        <div class="border border-gray-200 rounded-lg p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-bold">${visit.property_name}</h4>
                                    <p class="text-sm text-gray-600">Lead ID: ${visit.lead_id}</p>
                                    <p class="text-sm text-gray-600">Date: ${visitDate} at ${visit.visit_time || '-'}</p>
                                    <p class="text-sm text-gray-600">Staff: ${visit.assigned_staff || '-'}</p>
                                </div>
                                <span class="px-3 py-1 rounded-full text-xs font-semibold ${outcomeColor}">
                                    ${visit.outcome || 'Pending'}
                                </span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading visits:', error);
            }
        }

        document.getElementById('visitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            
            const visitDate = new Date(document.getElementById('visitDate').value);
            const visitTime = document.getElementById('visitTime').value;
            const [hours, minutes] = visitTime.split(':');
            visitDate.setHours(parseInt(hours), parseInt(minutes));

            try {
                const response = await fetch('/api/visits/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lead_id: parseInt(document.getElementById('leadId').value),
                        property_name: document.getElementById('propertyName').value,
                        visit_date: visitDate.toISOString(),
                        visit_time: document.getElementById('visitTime').value,
                        assigned_staff: document.getElementById('assignedStaff').value || null,
                        outcome: document.getElementById('outcome').value || null
                    })
                });

                if (response.ok) {
                    const visit = await response.json();
                    messageDiv.className = 'mt-4 p-3 rounded-lg bg-green-100 text-green-800';
                    messageDiv.innerHTML = `✓ Visit scheduled successfully! Visit ID: ${visit.id}`;
                    document.getElementById('visitForm').reset();
                    loadVisits();
                } else {
                    messageDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-800';
                    messageDiv.innerHTML = '✗ Error scheduling visit';
                }
            } catch (error) {
                messageDiv.className = 'mt-4 p-3 rounded-lg bg-red-100 text-red-800';
                messageDiv.innerHTML = `✗ Error: ${error.message}`;
            }
        });

        loadLeads();
        loadVisits();
        setInterval(loadVisits, 30000);
    </script>
</body>
</html>
